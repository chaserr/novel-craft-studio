name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Generate ONE token shared by all matrix builds of this release.
  # Recorded into the private ledger repo (anti-misuse).
  fingerprint:
    name: Generate build fingerprint
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.gen.outputs.token }}
      tag: ${{ steps.gen.outputs.tag }}
      timestamp: ${{ steps.gen.outputs.timestamp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      # Guard against the failure mode we hit on first try: electron-builder
      # publishes to a release named after package.json's version, NOT the
      # git tag. If they disagree, the Release page shows v0.X but the binary's
      # BUILD_FINGERPRINT and the ledger row reference v0.Y — confusing for
      # anyone tracing piracy back to a release.
      - name: Verify git tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ steps.tag.outputs.tag }}"
          EXPECTED="v$PKG_VERSION"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Git tag '$TAG' does not match package.json version '$EXPECTED'."
            echo "::error::Either bump package.json to match the tag, or retag to match the version."
            exit 1
          fi
          echo "ok: tag $TAG matches package.json $EXPECTED"

      - name: Generate token
        id: gen
        env:
          FINGERPRINT_SALT: ${{ secrets.FINGERPRINT_SALT }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RAND=$(openssl rand -hex 6)
          # Token shape: <tag>-<unix_ts_hex>-<8char_hash>
          # The hash includes a private salt so guessing future tokens is hard.
          # The salt comes from secrets.FINGERPRINT_SALT (set once, never rotated
          # unless compromised).
          HASH=$(printf "%s|%s|%s|%s" "$TAG" "$TS" "$RAND" "${FINGERPRINT_SALT:-no-salt}" \
            | shasum -a 256 | cut -c1-8)
          UNIX_HEX=$(printf '%x' "$(date -u +%s)")
          TOKEN="${TAG}-${UNIX_HEX}-${HASH}"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "timestamp=$TS" >> "$GITHUB_OUTPUT"
          echo "::notice title=Build fingerprint::$TOKEN  (tag=$TAG, ts=$TS)"

      # Append (tag, token, ts, commit, runner) into the author's private ledger
      # repo. Requires LEDGER_REPO + LEDGER_REPO_PAT secrets on the public repo:
      #   LEDGER_REPO     → e.g. "chaserr/novel-craft-private-ledger"
      #   LEDGER_REPO_PAT → fine-grained PAT with contents:write on that repo
      # Silently skipped if either secret is missing, so forks still build.
      - name: Record fingerprint in private ledger
        env:
          LEDGER_REPO: ${{ secrets.LEDGER_REPO }}
          LEDGER_PAT: ${{ secrets.LEDGER_REPO_PAT }}
          TOKEN: ${{ steps.gen.outputs.token }}
          TAG: ${{ steps.gen.outputs.tag }}
          TS: ${{ steps.gen.outputs.timestamp }}
        run: |
          set -e
          if [ -z "$LEDGER_REPO" ] || [ -z "$LEDGER_PAT" ]; then
            echo "ledger secrets not configured — skipping ledger update"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${LEDGER_PAT}@github.com/${LEDGER_REPO}.git" ledger
          cd ledger
          # Per-project subdir. Project name = the public repo's name
          # (e.g. "chaserr/novel-craft-studio" -> "novel-craft-studio").
          PROJECT="${GITHUB_REPOSITORY#*/}"
          mkdir -p "$PROJECT/releases"
          LEDGER="$PROJECT/releases/token-ledger.md"
          LINE="| ${TAG} | \`${TOKEN}\` | ${TS} | ${GITHUB_SHA} | ${GITHUB_RUN_ID} |"
          if [ ! -f "$LEDGER" ]; then
            {
              echo "# Release Token Ledger — ${PROJECT}"
              echo ""
              echo "Each public release of ${PROJECT} gets a unique BUILD_FINGERPRINT."
              echo "If a binary is found in commercial use, look up the token to identify the"
              echo "release it was derived from."
              echo ""
              echo "| tag | token | built_at_utc | commit | run_id |"
              echo "|-----|-------|--------------|--------|--------|"
            } > "$LEDGER"
          fi
          echo "$LINE" >> "$LEDGER"
          git -c user.name="release-bot" -c user.email="release-bot@users.noreply.github.com" \
            add "$LEDGER"
          git -c user.name="release-bot" -c user.email="release-bot@users.noreply.github.com" \
            commit -m "record ${PROJECT} ${TAG} → ${TOKEN}"
          git push origin HEAD

  build:
    name: Build (${{ matrix.os }})
    needs: fingerprint
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Overwrite build-token.ts with the per-release values BEFORE install/build.
      # Uses node so the same script works on macOS and Windows runners.
      - name: Inject build fingerprint
        env:
          NCS_BUILD_TOKEN: ${{ needs.fingerprint.outputs.token }}
          NCS_BUILD_TAG: ${{ needs.fingerprint.outputs.tag }}
          NCS_BUILD_TS: ${{ needs.fingerprint.outputs.timestamp }}
        shell: node {0}
        run: |
          const fs = require('node:fs');
          const path = 'src/shared/build-token.ts';
          const content =
            '// AUTOGENERATED by .github/workflows/release.yml — do not edit.\n' +
            "export const BUILD_TOKEN = '" + process.env.NCS_BUILD_TOKEN + "';\n" +
            "export const BUILD_CHANNEL: 'dev' | 'release' = 'release';\n" +
            "export const BUILD_TAG = '" + process.env.NCS_BUILD_TAG + "';\n" +
            "export const BUILD_TIMESTAMP = '" + process.env.NCS_BUILD_TS + "';\n";
          fs.writeFileSync(path, content);
          console.log('injected build-token.ts:\n' + content);

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main (electron-vite)
        run: npm run build

      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm exec -- electron-builder --mac --publish always

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec -- electron-builder --win --publish always
