appId: io.github.chaserr.orchid
productName: Orchid
copyright: Copyright © 2026 chaser

# 不让 electron-builder 自己 publish；release.yml workflow 用 gh release
# upload 显式上传 dmg / exe。这样 release 页只剩安装包，不会出现
# .blockmap / latest*.yml（那些是给 electron-updater 用的，目前没集成
# 自动更新，留着只是噪声）。
differentialPackage: false

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - package.json
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,readme,test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.cache"
  - "!**/*.{md,markdown}"

asarUnpack:
  - "node_modules/keytar/**/*"

extraResources:
  # Make resources/icon.png available at process.resourcesPath/icon.png at
  # runtime so the main process can call app.dock.setIcon() / BrowserWindow.icon.
  - from: resources/icon.png
    to: icon.png

mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
  category: Office
