appId: io.github.chaserr.orchid
productName: Orchid
copyright: Copyright © 2026 chaser

publish:
  - provider: github
    owner: chaserr
    repo: novel-craft-studio
    releaseType: release

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - package.json
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,readme,test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.cache"
  - "!**/*.{md,markdown}"

asarUnpack:
  - "node_modules/keytar/**/*"

mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
  category: Office
